<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 国庆13天自驾之旅 | 广东→广西→云南→成都→重庆→深圳</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0b0e1a;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.12);
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f0;
  --text-secondary: rgba(255,255,255,0.6);
  --accent: #f59e0b;
  --accent2: #ef4444;
  --accent3: #3b82f6;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --radius: 16px;
  --node-size: 64px;
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== Header ===== */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 18px 28px;
  background: linear-gradient(180deg, rgba(11,14,26,0.98) 60%, transparent);
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none;
}
.header h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.5px;
}
.header .subtitle {
  font-size: 12px; color: var(--text-secondary); margin-top: 2px;
  -webkit-text-fill-color: var(--text-secondary);
}
.header * { pointer-events: auto; }

/* ===== Legend ===== */
.legend {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  background: rgba(11,14,26,0.85); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 40px;
  padding: 10px 24px;
  display: flex; align-items: center; gap: 16px;
  font-size: 12px; color: var(--text-secondary);
  pointer-events: none;
}
.legend .dot { 
  display: inline-block; width: 8px; height: 8px; border-radius: 50%; 
  background: var(--accent); margin-right: 4px;
}
.legend .dot.dim { background: var(--text-secondary); opacity: 0.3; }
.legend .line-sample {
  display: inline-block; width: 24px; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  vertical-align: middle; margin-right: 4px; border-radius: 1px;
}
.legend span + span { margin-left: 0; }
.legend-sep { opacity: 0.2; }

/* ===== Map Container ===== */
.map-container {
  position: fixed; inset: 0; overflow: hidden;
}
.map-bg {
  position: absolute; inset: 0;
  background: 
    radial-gradient(ellipse at 30% 70%, rgba(245,158,11,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 30%, rgba(239,68,68,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.02) 0%, transparent 50%);
}
.map-grid {
  position: absolute; inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== SVG Path ===== */
.route-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* ===== Nodes ===== */
.nodes-layer {
  position: absolute; inset: 0; z-index: 2;
}
.node {
  position: absolute;
  width: var(--node-size); height: var(--node-size);
  border-radius: 50%;
  cursor: pointer;
  transform: translate(-50%, -50%);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
  z-index: 3;
}
.node-wrapper {
  position: absolute; inset: 0;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.node-wrapper::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(0,0,0,0.6));
  pointer-events: none;
}
.node img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease;
}
.node:hover .node-wrapper {
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(245,158,11,0.3), 0 8px 32px rgba(0,0,0,0.5);
}
.node:hover { transform: translate(-50%, -50%) scale(1.12); }
.node:hover img { transform: scale(1.1); }
.node .node-label {
  position: absolute; 
  left: 50%; transform: translateX(-50%);
  top: calc(100% + 8px);
  white-space: nowrap;
  font-size: 11px; color: var(--text-secondary);
  text-align: center;
  font-weight: 500;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  pointer-events: none;
  opacity: 0.7;
  transition: opacity 0.3s;
}
.node:hover .node-label { opacity: 1; color: var(--accent); }
.node .node-day {
  position: absolute;
  top: -4px; right: -4px;
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 50%;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  color: #0b0e1a;
  box-shadow: 0 2px 8px rgba(245,158,11,0.5);
  z-index: 5;
}

/* ===== Node Pulse Animation ===== */
.node.active .node-wrapper {
  border-color: var(--accent);
  box-shadow: 0 0 0 0 rgba(245,158,11,0.5);
  animation: pulse-ring 2s infinite;
}
@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.5); }
  50% { box-shadow: 0 0 0 12px rgba(245,158,11,0); }
  100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); }
}

/* ===== Node sizes ===== */
.node.key { --node-size: 76px; z-index: 4; }
.node.key .node-wrapper { border-color: rgba(245,158,11,0.4); }
.node.small { --node-size: 48px; }

/* ===== Detail Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(11,14,26,0.7);
  backdrop-filter: blur(8px);
  opacity: 0; visibility: hidden;
  transition: opacity 0.4s, visibility 0.4s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  position: fixed; inset: 0; z-index: 101;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
  overflow-y: auto;
  background: var(--bg);
}
.modal.open { transform: translateY(0); }
.modal-close {
  position: fixed; top: 20px; right: 24px; z-index: 102;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  color: white; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.15); }

/* Modal Hero */
.modal-hero {
  position: relative; height: 45vh; min-height: 320px;
  overflow: hidden;
}
.modal-hero img {
  width: 100%; height: 100%; object-fit: cover;
}
.modal-hero .hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 30%, rgba(11,14,26,0.95));
}
.modal-hero .hero-content {
  position: absolute; bottom: 40px; left: 0; right: 0;
  padding: 0 40px;
}
.modal-hero .day-badge {
  display: inline-block;
  padding: 4px 14px; border-radius: 20px;
  background: var(--accent); color: #0b0e1a;
  font-size: 12px; font-weight: 700;
  margin-bottom: 12px;
}
.modal-hero h2 {
  font-size: 36px; font-weight: 700;
  line-height: 1.2;
}
.modal-hero .hero-date {
  font-size: 14px; color: var(--text-secondary); margin-top: 8px;
}

/* Modal Content */
.modal-content {
  padding: 40px;
  max-width: 800px; margin: 0 auto;
}
.section-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  margin-bottom: 40px;
}
.info-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px;
  transition: background 0.2s;
}
.info-card:hover { background: var(--surface-hover); }
.info-card .icon {
  font-size: 24px; margin-bottom: 10px; display: block;
}
.info-card h3 {
  font-size: 14px; font-weight: 600; margin-bottom: 8px;
  color: var(--accent);
  letter-spacing: 0.5px;
}
.info-card h3 ~ h3 { margin-top: 16px; }
.info-card h3:not(:first-child) { margin-top: 16px; }
.info-card p {
  font-size: 14px; line-height: 1.7;
  color: var(--text-secondary);
}
.info-card .tag {
  display: inline-block;
  padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 500;
  background: rgba(245,158,11,0.15); color: var(--accent);
  margin-right: 4px; margin-bottom: 4px;
}

/* Modal Navigation */
.modal-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 0 48px;
  gap: 16px;
}
.modal-nav .nav-btn {
  padding: 12px 28px; border-radius: 40px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s;
  font-family: inherit;
}
.modal-nav .nav-btn:hover:not(:disabled) {
  background: var(--surface-hover);
  border-color: var(--accent);
  color: var(--accent);
}
.modal-nav .nav-btn:disabled {
  opacity: 0.3; cursor: not-allowed;
}
.modal-nav .nav-btn.back-btn {
  background: rgba(245,158,11,0.12);
  border-color: rgba(245,158,11,0.2);
  color: var(--accent);
}
.modal-nav .nav-btn.back-btn:hover {
  background: rgba(245,158,11,0.2);
}

/* ===== Animations ===== */
.node-enter {
  opacity: 0; transform: translate(-50%, -50%) scale(0);
}
.node-enter.show {
  opacity: 1; transform: translate(-50%, -50%) scale(1);
}
.node-enter.show.key { transform: translate(-50%, -50%) scale(1); }
.node-enter.show:hover { transform: translate(-50%, -50%) scale(1.12); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .header { padding: 14px 18px; }
  .header h1 { font-size: 16px; }
  .legend { font-size: 10px; padding: 8px 16px; gap: 10px; flex-wrap: wrap; justify-content: center; bottom: 14px; max-width: 95%; }
  .modal-hero { height: 30vh; min-height: 220px; }
  .modal-hero .hero-content { padding: 0 20px; bottom: 24px; }
  .modal-hero h2 { font-size: 24px; }
  .modal-content { padding: 24px 20px; }
  .section-grid { grid-template-columns: 1fr; }
  .modal-nav { flex-wrap: wrap; justify-content: center; }
  .node { --node-size: 48px; }
  .node.key { --node-size: 60px; }
  .node.small { --node-size: 40px; }
  .node .node-label { font-size: 9px; }
}
@media (max-width: 480px) {
  .node { --node-size: 40px; }
  .node.key { --node-size: 50px; }
  .node .node-day { width: 18px; height: 18px; font-size: 8px; }
}

/* ===== Scrollbar ===== */
.modal::-webkit-scrollbar { width: 6px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
.modal::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>

<!-- ===== Header ===== -->
<header class="header">

<div class="map-container">

        <stop offset="0%" stop-color="#f59e0b"/>
        <stop offset="50%" stop-color="#ef4444"/>
        <stop offset="100%" stop-color="#3b82f6"/>

      <filter id="glow">
        <feGaussianBlur stdDeviation="0.3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path id="routePath" d="" fill="none" stroke="url(#routeGrad)" stroke-width="0.3" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Animated dashed overlay -->
    <path id="routePathDash" d="" fill="none" stroke="url(#routeGrad)" stroke-width="0.2" stroke-dasharray="0.5,1" opacity="0.3"/>
  </svg>

  <!-- Nodes -->
  <div class="nodes-layer" id="nodesLayer"></div>
</div>

<!-- ===== Legend ===== -->
<div class="legend">
  <span><span class="dot"></span>途经城市</span>
  <span class="legend-sep">|</span>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="modalOverlay"></div>
<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div id="modalContent"></div>
</div>

// ===== Render Map =====
const nodesLayer = document.getElementById('nodesLayer');
const routePath = document.getElementById('routePath');
const routePathDash = document.getElementById('routePathDash');

function renderNodes() {
  nodesLayer.innerHTML = '';
  days.forEach((d, i) => {
    const node = document.createElement('div');
    node.className = `node node-enter ${d.size || ''}`;
    node.style.left = d.pos.x + '%';
    node.style.top = d.pos.y + '%';
    node.dataset.index = i;
    node.onclick = () => openModal(i);

    const wrapper = document.createElement('div');
    wrapper.className = 'node-wrapper';
    
    const img = document.createElement('img');
    img.src = d.images[0];
    img.alt = d.title;
    img.loading = 'lazy';
    
    const label = document.createElement('div');
    label.className = 'node-label';
    label.textContent = `${d.emoji} ${d.title}`;
    
    const dayBadge = document.createElement('div');
    dayBadge.className = 'node-day';
    dayBadge.textContent = d.day;

    wrapper.appendChild(img);
    node.appendChild(wrapper);
    node.appendChild(label);
    node.appendChild(dayBadge);
    nodesLayer.appendChild(node);

    // Staggered entrance animation
    setTimeout(() => node.classList.add('show'), 80 * i);
  });

  updateRoutePath();
}

function updateRoutePath() {
  let d = '';
  let dashD = '';
  const stopNodes = days.filter(n => n.routeStop !== false);
  
  stopNodes.forEach((n, i) => {
    const x = n.pos.x;
    const y = n.pos.y;
    if (i === 0) {
      d += `M ${x} ${y}`;
      dashD += `M ${x} ${y}`;
    } else {
      const prev = stopNodes[i - 1];
      const cx1 = (prev.pos.x + x) / 2;
      const cy1 = prev.pos.y;
      const cx2 = (prev.pos.x + x) / 2;
      const cy2 = y;
      d += `C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x} ${y}`;
      dashD += `C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x} ${y}`;
    }
  });

  routePath.setAttribute('d', d);
  routePathDash.setAttribute('d', dashD);
}

// ===== Modal =====
function buildModalHTML(index) {
  const d = days[index];
  const prevDisabled = index === 0;
  const nextDisabled = index === days.length - 1;
  
  let html = `
    <div class="modal-hero">
      <img src="${d.images[0]}" alt="${d.title}">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="day-badge">${d.emoji} DAY ${d.day} · ${d.date}</div>
        <h2>${d.title}</h2>
        <div class="hero-date">${d.subtitle}</div>
      </div>
    </div>
    <div class="modal-content">
      <div class="section-grid">
  `;

  const icons = { drive: '🚗', hotel: '🏨', food: '🍜', play: '🎯' };
  const labels = { drive: '🚗 开车', hotel: '🏨 酒店', food: '🍜 美食', play: '🎯 游玩' };

  for (const [key, section] of Object.entries(d.sections)) {
    html += `<div class="info-card">
      <span class="icon">${section.icon}</span>
      <h3>${labels[key] || section.icon + ' ' + key}</h3>`;
    section.items.forEach(item => {
      html += `<p><strong>${item.title}：</strong>${item.desc}</p>`;
    });
    html += `</div>`;
  }

  html += `
      </div>
      <div class="modal-nav">
        <button class="nav-btn" onclick="navigateDay(${index - 1})" ${prevDisabled ? 'disabled' : ''}>
          ← 上一篇
        </button>
        <button class="nav-btn back-btn" onclick="closeModal()">
          🗺️ 返回地图
        </button>
        <button class="nav-btn" onclick="navigateDay(${index + 1})" ${nextDisabled ? 'disabled' : ''}>
          下一篇 →
        </button>
      </div>
    </div>
  `;

  return html;
}

function openModal(index) {
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  
  content.innerHTML = buildModalHTML(index);
  overlay.classList.add('open');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Highlight active node
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  const nodes = document.querySelectorAll('.node');
  if (nodes[index]) nodes[index].classList.add('active');
}

function closeModal() {
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');
  modal.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
}

function navigateDay(newIndex) {
  if (newIndex < 0 || newIndex >= days.length) return;
  const content = document.getElementById('modalContent');
  // Fade out
  content.style.opacity = '0';
  content.style.transform = 'translateY(10px)';
  
  setTimeout(() => {
    content.innerHTML = buildModalHTML(newIndex);
    content.style.opacity = '';
    content.style.transform = '';
    // Scroll to top
    document.getElementById('modal').scrollTop = 0;
    
    // Update active node
    document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
    const nodes = document.querySelectorAll('.node');
    if (nodes[newIndex]) nodes[newIndex].classList.add('active');
  }, 200);
}

// ===== Keyboard navigation =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') {
    const active = document.querySelector('.node.active');
    if (active) {
      const idx = parseInt(active.dataset.index);
      navigateDay(idx - 1);
    }
  }
  if (e.key === 'ArrowRight') {
    const active = document.querySelector('.node.active');
    if (active) {
      const idx = parseInt(active.dataset.index);
      navigateDay(idx + 1);
    }
  }
});

// ===== Init =====
renderNodes();
</script>
